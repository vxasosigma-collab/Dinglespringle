<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DinglePringle – Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ========================= */
/*        THEME COLORS       */
/* ========================= */
:root {
    --green: #00ff44;
    --green-soft: #00e63a;
    --green-glow: #00ff4455;
    --bg: #050505;
    --panel: #0c0c0c;
    --text: #ffffff;
    --muted: #bbbbbb;
}

/* ========================= */
/*        GLOBAL STYLE       */
/* ========================= */
body {
    margin: 0;
    background: #000;
    color: var(--text);
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* ========================= */
/*        NAVBAR             */
/* ========================= */
.navbar {
    width: 100%;
    padding: 15px 30px;
    background: #000000cc;
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    gap: 40px;
    border-bottom: 2px solid var(--green);
    position: sticky;
    top: 0;
    z-index: 50;
}

.navbar a {
    color: var(--green);
    text-decoration: none;
    font-size: 18px;
    letter-spacing: 1px;
    transition: 0.2s;
}

.navbar a:hover {
    color: #fff;
    text-shadow: 0 0 10px var(--green);
}

/* ========================= */
/*        HERO SECTION       */
/* ========================= */
.hero {
    text-align: center;
    padding: 60px 20px 30px;
}

.hero-title {
    font-size: 56px;
    color: var(--green);
    text-shadow: 0 0 20px var(--green-glow);
}

.hero-sub {
    font-size: 20px;
    color: var(--muted);
    max-width: 600px;
    margin: 10px auto 0;
}

/* ========================= */
/*   TOP-CENTER NOTIFICATION */
/* ========================= */
.notify {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    background: #0f0f0f;
    border: 2px solid var(--green);
    padding: 18px 22px;
    border-radius: 14px;
    box-shadow: 0 0 20px var(--green-glow);
    width: 90%;
    max-width: 600px;
    text-align: center;
    z-index: 999;
    opacity: 0;
    transition: 0.6s ease;
}

.notify.show {
    top: 20px;
    opacity: 1;
}

.notify-title {
    font-size: 20px;
    font-weight: bold;
    color: var(--green);
}

.notify-buttons {
    margin-top: 12px;
    display: flex;
    justify-content: center;
    gap: 12px;
}

.btn {
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid var(--green);
    background: transparent;
    color: var(--green);
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
}

.btn:hover {
    background: var(--green);
    color: #000;
    box-shadow: 0 0 15px var(--green-glow);
}

/* ========================= */
/*     SHORTS SLIDER         */
/* ========================= */
.shorts-section {
    margin: 60px auto;
    max-width: 1100px;
    padding: 0 20px;
}

.section-title {
    font-size: 28px;
    color: var(--green);
    margin-bottom: 10px;
}

.shorts-slider {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding-bottom: 10px;
    scroll-behavior: smooth;
}

.shorts-slider::-webkit-scrollbar {
    height: 8px;
}

.shorts-slider::-webkit-scrollbar-thumb {
    background: var(--green);
    border-radius: 10px;
}

.short-card {
    min-width: 180px;
    background: var(--panel);
    border: 1px solid #111;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
}

.short-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 15px var(--green-glow);
}

.short-thumb {
    width: 100%;
    height: 320px;
    object-fit: cover;
}

/* ========================= */
/*   Q&A NOTIFICATION PANEL  */
/* ========================= */
.qa-panel {
    margin: 60px auto;
    max-width: 900px;
    background: #0b0b0b;
    border: 2px solid var(--green);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 0 20px var(--green-glow);
}

.qa-title {
    font-size: 24px;
    color: var(--green);
    margin-bottom: 10px;
}

.qa-item {
    background: #111;
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 10px;
    border: 1px solid #1a1a1a;
    cursor: pointer;
    transition: 0.2s;
}

.qa-item:hover {
    border-color: var(--green);
    box-shadow: 0 0 10px var(--green-glow);
}

.qa-answer {
    display: none;
    margin-top: 6px;
    color: var(--muted);
}

/* ========================= */
/*         FOOTER            */
/* ========================= */
.footer {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    margin-top: 40px;
}
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html">Home</a>
    <a href="suggestions.html">Suggestions</a>
    <a href="fanart.html">Fan Art</a>
</div>

<!-- NOTIFICATION POPUP -->
<div class="notify" id="notify">
    <div class="notify-title">WAIT — Dingle just dropped a new banger!</div>
    <div class="notify-buttons">
        <button class="btn" onclick="scrollToSection('longform')">Longform</button>
        <button class="btn" onclick="scrollToSection('shorts')">Shortform</button>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1 class="hero-title">DinglePringle Central</h1>
    <p class="hero-sub">Streams, shorts, chaos, and the most unhinged Q&A on the internet.</p>
</div>

<!-- SHORTS SLIDER -->
<div class="shorts-section" id="shorts">
    <div class="section-title">Latest Shorts</div>
    <div class="shorts-slider">
        <!-- AUTO GENERATED SHORTS -->
        <script>
            const shorts = [
                "XDWMaBt-PyM",
                "kBVp4Ot__is",
                "D7fbkFBaMy4",
                "x8-w0THZ8Mc",
                "EcbZL61DVj0",
                "fOhJ0zUiwLU"
            ];

            document.write(shorts.map(id => `
                <div class="short-card" onclick="window.open('https://youtube.com/shorts/${id}', '_blank')">
                    <img class="short-thumb" src="https://i.ytimg.com/vi/${id}/hq720.jpg">
                </div>
            `).join(""));
        </script>
    </div>
</div>

<!-- Q&A PANEL -->
<div class="qa-panel">
    <div class="qa-title">Q&A Notifications</div>
    <div id="qaList"></div>
</div>

<!-- FOOTER -->
<div class="footer">
    DinglePringle © <span id="year"></span>
</div>

<script>
// Show notification popup
setTimeout(() => {
    document.getElementById("notify").classList.add("show");
}, 800);

// Q&A generator
const qaList = document.getElementById("qaList");
for (let i = 1; i <= 20; i++) {
    const div = document.createElement("div");
    div.className = "qa-item";
    div.innerHTML = `
        <div class="qa-question">Q${i}. What is Dingle doing in episode #${i}?</div>
        <div class="qa-answer">Probably causing chaos and dragging chat with him.</div>
    `;
    div.onclick = () => {
        const ans = div.querySelector(".qa-answer");
        ans.style.display = ans.style.display === "block" ? "none" : "block";
    };
    qaList.appendChild(div);
}

// Scroll helper
function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({ behavior: "smooth" });
}

document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
