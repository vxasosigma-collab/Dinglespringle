<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Suggestions – DinglePringle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        background: #0d0d0d;
        color: white;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

    .navbar {
        width: 100%;
        background: #111;
        padding: 15px;
        display: flex;
        justify-content: center;
        gap: 40px;
        border-bottom: 2px solid #00ffcc;
    }

    .navbar a {
        color: #00ffcc;
        text-decoration: none;
        font-size: 20px;
        transition: 0.2s;
    }

    .navbar a:hover {
        color: white;
        text-shadow: 0 0 10px #00ffcc;
    }

    h1 {
        text-align: center;
        margin-top: 40px;
        font-size: 50px;
        color: #00ffcc;
    }

    .suggest-box {
        width: 90%;
        max-width: 600px;
        margin: 30px auto;
        background: #111;
        padding: 20px;
        border-radius: 10px;
        border: 2px solid #00ffcc;
    }

    input, textarea {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 6px;
        border: none;
        outline: none;
        background: #222;
        color: white;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #00ffcc;
        border: none;
        border-radius: 6px;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #00e6b8;
        box-shadow: 0 0 15px #00ffcc;
    }

    .suggestion-list {
        width: 90%;
        max-width: 700px;
        margin: 40px auto;
    }

    .suggestion {
        background: #111;
        padding: 15px;
        border-radius: 10px;
        border: 2px solid #00ffcc;
        margin-bottom: 15px;
    }
</style>
</head>
<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="suggestions.html">Suggestions</a>
    <a href="fanart.html">Fan Art</a>
</div>

<h1>Suggestions</h1>

<div class="suggest-box">
    <input id="name" placeholder="Your Name">
    <textarea id="suggestion" placeholder="Your Suggestion"></textarea>
    <button onclick="submitSuggestion()">Submit</button>
</div>

<div class="suggestion-list" id="suggestionList"></div>

<script>
function submitSuggestion() {
    let name = document.getElementById("name").value;
    let text = document.getElementById("suggestion").value;

    if (!name || !text) return alert("Fill everything");

    let list = JSON.parse(localStorage.getItem("suggestions") || "[]");

    list.push({ name, text });

    localStorage.setItem("suggestions", JSON.stringify(list));

    loadSuggestions();
}

function loadSuggestions() {
    let list = JSON.parse(localStorage.getItem("suggestions") || "[]");
    let box = document.getElementById("suggestionList");

    box.innerHTML = "";

    list.forEach(s => {
        box.innerHTML += `
            <div class="suggestion">
                <strong>${s.name}</strong><br>
                ${s.text}
            </div>
        `;
    });
}

loadSuggestions();
</script>

</body>
</html>
